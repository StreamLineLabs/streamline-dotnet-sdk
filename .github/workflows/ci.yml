name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore
      - run: dotnet build --no-restore
      - name: Run unit tests
        run: dotnet test tests/Streamline.Client.Tests --no-build --verbosity normal

  conformance:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: dotnet restore
      - run: dotnet build --no-restore

      - name: Start Streamline server
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9094/health > /dev/null 2>&1; then
              echo "Streamline is healthy"
              exit 0
            fi
            echo "Waiting for Streamline... ($i/30)"
            sleep 2
          done
          echo "Streamline failed to start"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Run conformance tests
        run: dotnet test tests/Streamline.Conformance --no-build --verbosity normal

      - name: Stop Streamline server
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
